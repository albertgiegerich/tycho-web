services:
  postgres:
    image: postgres:18
    container_name: tycho-db
    environment:
      - POSTGRES_USER=${DB_USER_POSTGRES}
      - POSTGRES_PASSWORD=${DB_PASSWORD_POSTGRES}
      - POSTGRES_DB=${DB_NAME}
      - DB_USER_APP=${DB_USER_APP}
      - DB_PASSWORD_APP=${DB_PASSWORD_APP}
      - DB_USER_ADMIN=${DB_USER_ADMIN}
      - DB_PASSWORD_ADMIN=${DB_PASSWORD_ADMIN}
    volumes:
      - ./pgdata:/var/lib/postgresql
      - ./init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
    ports:
      - "5432:5432"


    
